name: Monthly MV Full Sync
                                                                                                                                                               
 "on":
    schedule:
      - cron: '0 3 1 * *'
    workflow_dispatch:                                                                                                                                         
  
  jobs:                                                                                                                                                        
    sync:                                                                                                                                                    
      runs-on: ubuntu-latest
      timeout-minutes: 360

      steps:
        - name: Checkout
          uses: actions/checkout@v4                                                                                                                            
  
        - name: Set up Python                                                                                                                                  
          uses: actions/setup-python@v5                                                                                                                      
          with:
            python-version: '3.11'
            cache: 'pip'                                                                                                                                       
  
        - name: Install dependencies                                                                                                                           
          run: pip install -r requirements.txt                                                                                                               

        - name: Full MV sync (scrapes TM directly)                                                                                                             
          env:
            SUPABASE_URL: ${{ secrets.SUPABASE_URL }}                                                                                                          
            SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}                                                                                          
            TM_DELAY: '0.5'
          run: python3 scripts/sync_all_market_values.py                                                                                                       
                                                                                                                                                               
        - name: Clean outlier MVs                                                                                                                              
          env:                                                                                                                                                 
            SUPABASE_URL: ${{ secrets.SUPABASE_URL }}                                                                                                        
            SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}                                                                                          
          run: python3 scripts/clean_outlier_mvs.py

name: Monthly Market Value Sync

on:
  schedule:
    - cron: '0 3 1 * *'   # 03:00 UTC on the 1st of each month
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Compute + report only, write nothing to the DB'
        type: boolean
        default: false
      limit:
        description: 'Cap number of players processed (blank = all)'
        type: string
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Preflight — check secrets are visible
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TM_API_BASE_URL: ${{ secrets.TM_API_BASE_URL }}
        run: |
          echo "SUPABASE_URL set:        ${SUPABASE_URL:+yes}${SUPABASE_URL:-NO}"
          echo "SUPABASE_SERVICE_KEY set: ${SUPABASE_SERVICE_KEY:+yes}${SUPABASE_SERVICE_KEY:-NO}"
          echo "TM_API_BASE_URL set:     ${TM_API_BASE_URL:+yes}${TM_API_BASE_URL:-NO}"

      - name: Sync market values from Transfermarkt
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TM_API_BASE_URL: ${{ secrets.TM_API_BASE_URL }}
          TM_DELAY: '0.5'
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          SYNC_LIMIT: ${{ inputs.limit }}
        run: python3 scripts/sync_market_values.py

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mv-review-report
          path: mv_review.json
          if-no-files-found: ignore
